services:
  dtrack-apiserver:
    image: dependencytrack/apiserver
    ports:
      - "8081:8080"
    volumes:
      - dtrack-data:/data
    environment:
      ALPINE_DATABASE_MODE: external
      ALPINE_DATABASE_URL: jdbc:h2:/data/dtrack
    restart: unless-stopped

  dtrack-frontend:
    image: dependencytrack/frontend
    ports:
      - "8082:8080"
    environment:
      API_BASE_URL: http://localhost:8081
    depends_on:
      - dtrack-apiserver
    restart: unless-stopped

volumes:
  dtrack-data:
