# ============================================================
# DevSecOps Lab · ГОСТ Р 56939-2024
# MkDocs Material — GitHub Pages
# ============================================================

site_name: "DevSecOps Lab · ГОСТ Р 56939-2024"
site_description: "Практический полигон для изучения безопасной разработки ПО по ГОСТ Р 56939-2024 — 6 этапов, 30+ инструментов DevSecOps, 4 учебные мишени"
site_url: "https://Nefrit0n.github.io/devsecops-intern-labs/"
repo_url: "https://github.com/Nefrit0n/devsecops-intern-labs"
repo_name: "devsecops-intern-labs"
edit_uri: "edit/main/"

docs_dir: ".mkdocs-build-docs"

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/shield-check
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  custom_dir: site-docs/overrides

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nefrit0n/devsecops-intern-labs
  generator: false
  analytics:
    provider: ""
  # Переменные для macros-плагина ({{ tools_count }}, {{ stages_count }} и т.д.)
  gost_processes: 25
  tools_count: "30+"
  stages_count: 6
  total_hours: "~60"
  targets_count: 4

extra_css:
  - assets/extra.css

copyright: "MIT License · Сделано для тех, кто хочет не просто запускать инструменты, а понимать зачем."

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang: ru
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      locale: ru
      fallback_to_build_date: true
      strict: false
  - macros:
      verbose: false
      on_error_fail: false
      on_undefined: keep
      j2_block_start_string: "[%"
      j2_block_end_string: "%]"
      j2_variable_start_string: "[["
      j2_variable_end_string: "]]"

not_in_nav: |
  solutions/stage-0/**
  solutions/stage-1/**
  solutions/stage-2/**
  solutions/stage-3/**
  solutions/stage-4/**
  solutions/stage-5/**

