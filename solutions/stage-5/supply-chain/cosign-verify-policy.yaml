# Kyverno Policy: Verify Image Signature · Эталонное решение
# Блокирует деплой неподписанных образов

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signatures
    policies.kyverno.io/description: >-
      Требование 5.16 ГОСТ: обеспечение целостности артефактов при выпуске.
      Все образы должны быть подписаны cosign перед деплоем.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
  - name: check-cosign-signature
    match:
      any:
      - resources:
          kinds:
          - Pod
    verifyImages:
    - imageReferences:
      - "ghcr.io/your-org/*"
      attestors:
      - entries:
        - keyless:
            issuer: "https://token.actions.githubusercontent.com"
            subject: "https://github.com/your-org/devsecops-intern-labs/.github/workflows/*"
            rekor:
              url: https://rekor.sigstore.dev
