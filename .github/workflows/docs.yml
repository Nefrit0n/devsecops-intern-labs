name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'site-docs/**'
      - 'stage-*/**'
      - 'targets/**'
      - 'docs/**'
      - 'checklists/**'
      - 'solutions/**'
      - 'lab-infra/**'
      - 'assets/**'
      - 'scripts/prepare_mkdocs_docs.py'
      - 'scripts/generate_progress.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Markdown lint (allow-failure на первое время) ──────
      - name: Markdown lint
        continue-on-error: true
        run: |
          npx markdownlint-cli2 \
            "site-docs/**/*.md" \
            "stage-*/**/*.md" \
            "docs/**/*.md" \
            "checklists/**/*.md" || true

      - name: Install MkDocs + Material + plugins
        run: |
          pip install \
            "mkdocs<2" \
            "mkdocs-material>=9.7,<10" \
            mkdocs-minify-plugin \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-macros-plugin \
            pymdown-extensions \
            pillow \
            cairosvg

      # Генерация прогресса (если скрипт существует)
      - name: Generate progress data
        run: |
          if [ -f scripts/generate_progress.py ]; then
            python scripts/generate_progress.py
          fi

      # Собирает дерево docs: копирует stage-*/, targets/, docs/ и т.д.
      # в .mkdocs-build-docs/ и перезаписывает внутренние ссылки
      - name: Prepare docs tree
        run: python scripts/prepare_mkdocs_docs.py

      # --strict: любое WARNING превращается в ошибку сборки.
      # Ловит битые внутренние ссылки, отсутствующие страницы из nav,
      # неизвестные markdown-расширения и другие проблемы.
      - name: Build site (strict — проверка ссылок и навигации)
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
