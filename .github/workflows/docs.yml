name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'site-docs/**'
      - 'stage-*/**'
      - 'targets/**'
      - 'docs/**'
      - 'checklists/**'
      - 'solutions/**'
      - 'lab-infra/**'
      - 'assets/**'
      - 'scripts/prepare_mkdocs_docs.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs + Material
        run: |
          pip install \
            "mkdocs<2" \
            "mkdocs-material>=9.7,<10" \
            mkdocs-minify-plugin \
            pymdown-extensions \
            pillow \
            cairosvg

      - name: Prepare docs tree
        run: python scripts/prepare_mkdocs_docs.py

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
